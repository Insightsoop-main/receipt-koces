name: Build and Push to GHCR (Production)

on:
  push:
    branches: [ "production" ]
  pull_request:
    branches: [ "production" ]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    if: |
      github.event_name == 'push' || 
      (github.event_name == 'pull_request' && github.base_ref == 'refs/heads/production')
    runs-on: ubuntu-latest
    environment: prod_env
    permissions:
      contents: read
      packages: write

    steps:
      # 1. 이미지 이름을 소문자로 변환하여 환경 변수에 설정
      - name: Set lowercase image name
        run: |
          echo "IMAGE_NAME=$(echo "${{ github.repository_owner }}/${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # 2. 환경 변수 출력 (디버깅용, 시크릿 값은 노출하지 않음)
      - name: Print environment variables
        run: |
          echo "REGISTRY: ${{ env.REGISTRY }}"
          echo "IMAGE_NAME: ${{ env.IMAGE_NAME }}"
          echo "GITHUB_REF: ${{ github.ref }}"
          echo "EC2_INSTANCE_ID set: ${{ secrets.EC2_INSTANCE_ID != '' }}"
          echo "AWS_ACCESS_KEY_ID set: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}"

      # 3. 코드 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4

      # 4. Java 환경 설정 (Gradle 빌드용)
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 5. Gradle 빌드 (실행권한)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 6. Gradle 빌드 (테스트 제외)
      - name: Build with Gradle (skip tests)
        run: ./gradlew build -x test

      # 7. GitHub container registry (ghcr.io) 로그인
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # GitHub 이 자동으로 생성하는 인증 토큰

      # 8. Docker 이미지 메타데이터 추출 - latest 및 git commit SHA 기반 생성
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      # 9. 이미지 빌드 및 GitHub Container Registry 에 푸시
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # NOTE: build-args 제거됨. 접속정보·시크릿은 EC2 런타임 환경변수로 주입
          # (EC2 측 /etc/koces-receipt.env + pull_and_run.sh 참고)

      # 10. AWS 자격 증명 설정
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-northeast-2
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      # 11. AWS Systems Manager(SSM)을 통해 원격 인스턴스에서 배포 스크립트 실행
      # SSH 키 관리 불필요, 모든 배포가 SSM 감사 로그에 남음
      - name: Execute Script via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":["cd /home/ec2-user && ./pull_and_run.sh"]}' \
            --comment "Deploy receipt-koces from GHA $GITHUB_SHA"
