spring:
  profiles:
    active: dev #prod
  application:
    name: kocesReceipt

logging:
  level:
    org:
      springframework: DEBUG
---
spring:
  config:
    activate:
      on-profile: prod
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: jdbc:postgresql://allink-receipt-dev.cqska7qadd9r.ap-northeast-2.rds.amazonaws.com:5432/allink-receipt-db
    username: allink-admin
    password: "!receipt12#$"
    driver-class-name: org.postgresql.Driver
    hikari:
      auto-commit: true
      connection-timeout: 10000
      maximum-pool-size: 15
      minimum-idle: 1
  jpa:
    database: postgresql
    hibernate:
      ddl-auto: none
    show-sql: true
  server:
    port: 10033

